<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Timetable Planner | John Gichaga</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:    #0D1B2A;
      --navy-mid:#1A2E44;
      --white:   #FFFFFF;
      --mist:    #F0F4FA;
      --mist2:   #E2E8F4;
      --slate:   #4A6080;
      --silver:  #8A9BB5;
      --border:  rgba(13,27,42,0.08);
      --accent:  #E8A020;
      --accent-d:#C4861A;
      --shadow:  0 2px 8px rgba(13,27,42,0.08);
      --shadow-md:0 8px 32px rgba(13,27,42,0.12);
    }

    /* Subject color palette */
    --c0: #3B82F6; --c0b: #EFF6FF;
    --c1: #8B5CF6; --c1b: #F5F3FF;
    --c2: #EC4899; --c2b: #FDF2F8;
    --c3: #10B981; --c3b: #ECFDF5;
    --c4: #F59E0B; --c4b: #FFFBEB;
    --c5: #EF4444; --c5b: #FEF2F2;
    --c6: #06B6D4; --c6b: #ECFEFF;
    --c7: #84CC16; --c7b: #F7FEE7;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--mist);
      color: var(--navy);
      min-height: 100vh;
      padding: 24px 12px 60px;
    }

    /* ── Header ── */
    .page-header { text-align: center; margin-bottom: 28px; }
    .page-header__label {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 8px;
    }
    .page-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      color: var(--navy); line-height: 1.1;
    }
    .page-header h1 em { color: var(--accent); font-style: italic; }
    .page-header p { color: var(--slate); font-size: 0.88rem; margin-top: 8px; }

    /* ── Layout ── */
    .layout {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 720px) { .layout { grid-template-columns: 1fr; } }

    /* ── Sidebar ── */
    .sidebar {}

    .card {
      background: var(--white);
      border-radius: 14px;
      padding: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .card h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }

    /* Subject form */
    .field { margin-bottom: 10px; }
    .field label { font-size: 0.75rem; font-weight: 600; color: var(--slate); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .field input, .field select {
      font-family: 'DM Sans', sans-serif;
      width: 100%; padding: 9px 10px; font-size: 0.85rem;
      background: var(--mist); border: 1.5px solid transparent;
      border-radius: 8px; outline: none; color: var(--navy);
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); background: var(--white); }

    .add-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: var(--navy);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .add-btn:hover { background: var(--accent-d); transform: translateY(-1px); }

    /* Subject list */
    .subject-list { display: flex; flex-direction: column; gap: 6px; }
    .subject-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 0.82rem; font-weight: 500;
      cursor: grab;
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none;
      border: 1.5px solid transparent;
    }
    .subject-pill:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .subject-pill__dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .subject-pill__name { flex: 1; }
    .subject-pill__del {
      font-size: 1rem; color: inherit; opacity: 0.5;
      cursor: pointer; line-height: 1;
      background: none; border: none;
      transition: opacity 0.15s;
    }
    .subject-pill__del:hover { opacity: 1; }

    /* ── Timetable ── */
    .timetable-wrap { overflow-x: auto; }

    .timetable {
      min-width: 560px;
      background: var(--white);
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .tt-header {
      display: grid;
      grid-template-columns: 72px repeat(7, 1fr);
      background: var(--navy);
    }
    .tt-header div {
      padding: 12px 4px;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }
    .tt-header div:first-child { color: rgba(255,255,255,0.4); }

    .tt-row {
      display: grid;
      grid-template-columns: 72px repeat(7, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .tt-row:last-child { border-bottom: none; }

    .tt-time {
      padding: 10px 4px;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--silver);
      background: var(--mist);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tt-cell {
      border-left: 1px solid var(--border);
      min-height: 56px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tt-cell:hover { background: var(--mist); }

    .tt-cell.filled { cursor: pointer; }
    .tt-cell__subject {
      width: 100%; height: 100%;
      min-height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6px 4px;
      font-size: 0.7rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.3;
      border-radius: 0;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .tt-cell__subject:hover { filter: brightness(0.95); }
    .tt-cell__subject .remove-x {
      position: absolute;
      top: 3px; right: 4px;
      font-size: 0.7rem;
      opacity: 0;
      transition: opacity 0.15s;
      cursor: pointer;
      line-height: 1;
    }
    .tt-cell:hover .remove-x { opacity: 0.7; }

    .tt-cell.drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
      margin-bottom: 12px;
    }
    .toolbar h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem; color: var(--navy);
    }
    .toolbar-btns { display: flex; gap: 8px; }
    .tbtn {
      padding: 7px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      border-radius: 8px; border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .tbtn:hover { opacity: 0.85; transform: translateY(-1px); }
    .tbtn--print { background: var(--navy); color: var(--white); }
    .tbtn--clear { background: var(--mist2); color: var(--slate); }

    /* Legend */
    .legend {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 12px;
      padding: 14px 16px;
      background: var(--mist);
      border-radius: 10px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.75rem; font-weight: 500; color: var(--slate);
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    .back-link { text-align: center; margin-top: 28px; font-size: 0.82rem; color: var(--silver); }
    .back-link a { color: var(--accent); text-decoration: none; font-weight: 600; }

    @media print {
      body { padding: 0; background: white; }
      .sidebar, .toolbar, .back-link { display: none !important; }
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <p class="page-header__label">Project by John Gichaga</p>
    <h1>Study Timetable<br /><em>Planner</em></h1>
    <p>Build your weekly study schedule — click a cell to assign a subject</p>
  </div>

  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="card">
        <h3>📖 Add Subject</h3>
        <div class="field">
          <label>Subject Name</label>
          <input type="text" id="subjInput" placeholder="e.g. Mathematics" maxlength="24" />
        </div>
        <div class="field">
          <label>Colour</label>
          <select id="colorSelect"></select>
        </div>
        <button class="add-btn" onclick="addSubject()">+ Add Subject</button>
      </div>

      <div class="card">
        <h3>📋 Subjects</h3>
        <div class="subject-list" id="subjectList">
          <p style="font-size:0.8rem;color:var(--silver)">No subjects yet. Add one above.</p>
        </div>
      </div>
    </div>

    <!-- Timetable -->
    <div>
      <div class="toolbar">
        <h2>Weekly Timetable</h2>
        <div class="toolbar-btns">
          <button class="tbtn tbtn--clear" onclick="clearAll()">✕ Clear All</button>
          <button class="tbtn tbtn--print" onclick="window.print()">🖨 Print</button>
        </div>
      </div>

      <div class="timetable-wrap">
        <div class="timetable" id="timetable"></div>
      </div>

      <div class="legend" id="legend">
        <span style="font-size:0.75rem;color:var(--silver)">Add subjects to see legend</span>
      </div>
    </div>

  </div>

  <p class="back-link">Built by <a href="index.html">John Gichaga</a> · Portfolio Project</p>

  <script>
    const DAYS  = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']
    const TIMES = [
      '5:00 AM','6:00 AM','7:00 PM',
      '8:00 PM','9:00 PM'
    ]

    const COLORS = [
      { name: 'Blue',    text: '#1D4ED8', bg: '#EFF6FF' },
      { name: 'Purple',  text: '#6D28D9', bg: '#F5F3FF' },
      { name: 'Pink',    text: '#BE185D', bg: '#FDF2F8' },
      { name: 'Green',   text: '#065F46', bg: '#ECFDF5' },
      { name: 'Amber',   text: '#92400E', bg: '#FFFBEB' },
      { name: 'Red',     text: '#991B1B', bg: '#FEF2F2' },
      { name: 'Cyan',    text: '#155E75', bg: '#ECFEFF' },
      { name: 'Lime',    text: '#3F6212', bg: '#F7FEE7' },
      { name: 'Indigo',  text: '#3730A3', bg: '#EEF2FF' },
      { name: 'Orange',  text: '#9A3412', bg: '#FFF7ED' },
    ]

    let subjects = []    // { id, name, colorIndex }
    let schedule = {}    // key: `${dayIdx}-${timeIdx}` → subjectId
    let selectedSubject = null

    // Populate color select
    const colorSel = document.getElementById('colorSelect')
    COLORS.forEach((c, i) => {
      const opt = document.createElement('option')
      opt.value = i
      opt.textContent = c.name
      colorSel.appendChild(opt)
    })

    // ── Build timetable grid ──
    function buildGrid() {
      const tt = document.getElementById('timetable')
      tt.innerHTML = ''

      // Header row
      const hdr = document.createElement('div')
      hdr.className = 'tt-header'
      hdr.innerHTML = '<div>Time</div>' + DAYS.map(d => `<div>${d}</div>`).join('')
      tt.appendChild(hdr)

      // Time rows
      TIMES.forEach((time, ti) => {
        const row = document.createElement('div')
        row.className = 'tt-row'

        const timeCell = document.createElement('div')
        timeCell.className = 'tt-time'
        timeCell.textContent = time
        row.appendChild(timeCell)

        DAYS.forEach((_, di) => {
          const cell = document.createElement('div')
          cell.className = 'tt-cell'
          cell.dataset.day = di
          cell.dataset.time = ti

          const key = `${di}-${ti}`
          if (schedule[key] !== undefined) {
            const subj = subjects.find(s => s.id === schedule[key])
            if (subj) renderCellContent(cell, subj, key)
          }

          cell.addEventListener('click', () => cellClick(cell, di, ti))
          cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drag-over') })
          cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'))
          cell.addEventListener('drop', e => {
            e.preventDefault()
            cell.classList.remove('drag-over')
            const subjectId = parseInt(e.dataTransfer.getData('subjectId'))
            const subj = subjects.find(s => s.id === subjectId)
            if (subj) assignSubject(cell, subj, di, ti)
          })

          row.appendChild(cell)
        })

        tt.appendChild(row)
      })
    }

    function renderCellContent(cell, subj, key) {
      const color = COLORS[subj.colorIndex]
      cell.classList.add('filled')
      cell.innerHTML = `
        <div class="tt-cell__subject" style="background:${color.bg};color:${color.text}">
          <span class="remove-x" onclick="clearCell(event,'${key}')">✕</span>
          ${subj.name}
        </div>
      `
    }

    function cellClick(cell, di, ti) {
      if (selectedSubject === null) return
      const subj = subjects.find(s => s.id === selectedSubject)
      if (!subj) return
      assignSubject(cell, subj, di, ti)
    }

    function assignSubject(cell, subj, di, ti) {
      const key = `${di}-${ti}`
      schedule[key] = subj.id
      renderCellContent(cell, subj, key)
    }

    function clearCell(e, key) {
      e.stopPropagation()
      delete schedule[key]
      buildGrid()
    }

    function clearAll() {
      if (confirm('Clear the entire timetable?')) {
        schedule = {}
        buildGrid()
      }
    }

    // ── Add subject ──
    let nextId = 1
    function addSubject() {
      const name = document.getElementById('subjInput').value.trim()
      if (!name) return
      const colorIndex = parseInt(colorSel.value)
      const subj = { id: nextId++, name, colorIndex }
      subjects.push(subj)
      document.getElementById('subjInput').value = ''
      renderSubjectList()
      updateLegend()
      // Auto-select new subject
      selectSubject(subj.id)
    }

    function deleteSubject(id) {
      subjects = subjects.filter(s => s.id !== id)
      // Remove from schedule
      Object.keys(schedule).forEach(k => { if (schedule[k] === id) delete schedule[k] })
      if (selectedSubject === id) selectedSubject = null
      renderSubjectList()
      updateLegend()
      buildGrid()
    }

    function selectSubject(id) {
      selectedSubject = id
      document.querySelectorAll('.subject-pill').forEach(p => {
        p.style.outline = p.dataset.id == id ? '2px solid var(--accent)' : 'none'
      })
    }

    function renderSubjectList() {
      const list = document.getElementById('subjectList')
      if (subjects.length === 0) {
        list.innerHTML = '<p style="font-size:0.8rem;color:var(--silver)">No subjects yet. Add one above.</p>'
        return
      }
      list.innerHTML = subjects.map(s => {
        const c = COLORS[s.colorIndex]
        return `
          <div class="subject-pill" data-id="${s.id}"
               style="background:${c.bg};color:${c.text};border-color:${c.bg}"
               onclick="selectSubject(${s.id})"
               draggable="true"
               ondragstart="event.dataTransfer.setData('subjectId','${s.id}')">
            <span class="subject-pill__dot" style="background:${c.text}"></span>
            <span class="subject-pill__name">${s.name}</span>
            <button class="subject-pill__del" onclick="event.stopPropagation();deleteSubject(${s.id})">✕</button>
          </div>
        `
      }).join('')
    }

    function updateLegend() {
      const legend = document.getElementById('legend')
      if (subjects.length === 0) {
        legend.innerHTML = '<span style="font-size:0.75rem;color:var(--silver)">Add subjects to see legend</span>'
        return
      }
      legend.innerHTML = subjects.map(s => {
        const c = COLORS[s.colorIndex]
        return `<div class="legend-item">
          <div class="legend-dot" style="background:${c.text}"></div>
          <span>${s.name}</span>
        </div>`
      }).join('')
    }

    // ── Enter key shortcut ──
    document.getElementById('subjInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addSubject()
    })

    // ── Init with sample subjects ──
    const SAMPLE = [
      { name: 'Mathematics', ci: 0 },
      { name: 'English',     ci: 1 },
      { name: 'Physics',     ci: 2 },
      { name: 'Chemistry',   ci: 3 },
      { name: 'Kiswahili',   ci: 4 },
    ]
    SAMPLE.forEach(s => {
      subjects.push({ id: nextId++, name: s.name, colorIndex: s.ci })
    })
    renderSubjectList()
    updateLegend()
    buildGrid()
    selectSubject(subjects[0].id)
  </script>

</body>
</html>
