<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator | John Gichaga</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0A0F1A;
      --surface:   #111827;
      --surface2:  #1C2638;
      --border:    rgba(255,255,255,0.08);
      --navy:      #0D1B2A;
      --accent:    #E8A020;
      --accent-dim:#C4861A;
      --green:     #22C55E;
      --yellow:    #EAB308;
      --red:       #EF4444;
      --text:      #F1F5F9;
      --muted:     #64748B;
      --mono:      'DM Mono', monospace;
      --sans:      'DM Sans', sans-serif;
      --display:   'DM Serif Display', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      /* Dot grid background */
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }
    .header__label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .header h1 {
      font-family: var(--display);
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--text);
      line-height: 1.1;
    }
    .header h1 em { color: var(--accent); font-style: italic; }
    .header p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 10px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    /* ── Password display ── */
    .pwd-display {
      position: relative;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 56px 20px 20px;
      margin-bottom: 8px;
      min-height: 72px;
      display: flex;
      align-items: center;
    }
    .pwd-display__text {
      font-family: var(--mono);
      font-size: clamp(0.85rem, 2.5vw, 1.05rem);
      color: var(--text);
      word-break: break-all;
      line-height: 1.6;
      flex: 1;
      letter-spacing: 0.05em;
    }
    .pwd-display__text.empty { color: var(--muted); font-style: italic; }

    .copy-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .copy-btn:hover { background: var(--accent-dim); transform: translateY(-50%) scale(1.08); }
    .copy-btn:active { transform: translateY(-50%) scale(0.95); }
    .copy-btn svg { width: 16px; height: 16px; fill: #0D1B2A; }

    /* ── Strength bar ── */
    .strength {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .strength__bars {
      display: flex;
      gap: 4px;
      flex: 1;
    }
    .strength__bar {
      flex: 1;
      height: 4px;
      border-radius: 4px;
      background: var(--surface2);
      transition: background 0.4s;
    }
    .strength__label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-width: 64px;
      text-align: right;
      color: var(--muted);
      transition: color 0.3s;
    }

    /* ── Controls ── */
    .control { margin-bottom: 22px; }

    .control__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .control__label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }
    .control__value {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 500;
      background: rgba(232,160,32,0.1);
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* Range slider */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: var(--surface2);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(232,160,32,0.2);
      transition: box-shadow 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 6px rgba(232,160,32,0.25);
    }

    /* Checkboxes */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }
    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    .option:hover { border-color: rgba(232,160,32,0.3); }
    .option.checked {
      border-color: var(--accent);
      background: rgba(232,160,32,0.06);
    }
    .option input[type="checkbox"] { display: none; }
    .option__box {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 2px solid var(--muted);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }
    .option.checked .option__box {
      border-color: var(--accent);
      background: var(--accent);
    }
    .option__box::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid #0D1B2A;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0;
      transition: opacity 0.15s;
    }
    .option.checked .option__box::after { opacity: 1; }
    .option__text {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
    }

    /* ── Buttons ── */
    .btn-generate {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #0D1B2A;
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-bottom: 12px;
    }
    .btn-generate:hover {
      background: var(--accent-dim);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232,160,32,0.3);
    }
    .btn-generate:active { transform: translateY(0); }

    .btn-refresh {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-refresh:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    /* ── Toast notification ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 100px;
      box-shadow: 0 8px 24px rgba(34,197,94,0.35);
      transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
      pointer-events: none;
      z-index: 50;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── History ── */
    .history {
      margin-top: 28px;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    .history h3 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .history__list { display: flex; flex-direction: column; gap: 8px; }
    .history__item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      border-radius: 8px;
      padding: 10px 14px;
      gap: 12px;
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: none; }
    }
    .history__pwd {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .history__copy {
      font-size: 0.72rem;
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      flex-shrink: 0;
    }
    .history__copy:hover { text-decoration: underline; }

    /* Back link */
    .back-link {
      margin-top: 24px;
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
    }
    .back-link a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="header">
    <p class="header__label">Project by John Gichaga</p>
    <h1>Password<br /><em>Generator</em></h1>
    <p>Create strong, secure passwords instantly</p>
  </div>

  <div class="card">

    <!-- Password output -->
    <div class="pwd-display" id="pwdDisplay">
      <span class="pwd-display__text empty" id="pwdText">Click Generate to create a password…</span>
      <button class="copy-btn" id="copyBtn" title="Copy to clipboard">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 1H4C2.9 1 2 1.9 2 3v14h2V3h12V1zm3 4H8C6.9 5 6 5.9 6 7v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
        </svg>
      </button>
    </div>

    <!-- Strength indicator -->
    <div class="strength">
      <div class="strength__bars">
        <div class="strength__bar" id="bar1"></div>
        <div class="strength__bar" id="bar2"></div>
        <div class="strength__bar" id="bar3"></div>
        <div class="strength__bar" id="bar4"></div>
      </div>
      <span class="strength__label" id="strengthLabel">—</span>
    </div>

    <!-- Length slider -->
    <div class="control">
      <div class="control__header">
        <span class="control__label">Password Length</span>
        <span class="control__value" id="lengthVal">16</span>
      </div>
      <input type="range" id="lengthSlider" min="6" max="64" value="16" />
    </div>

    <!-- Character options -->
    <div class="options">
      <label class="option checked" id="opt-upper">
        <input type="checkbox" checked />
        <div class="option__box"></div>
        <span class="option__text">Uppercase (A–Z)</span>
      </label>
      <label class="option checked" id="opt-lower">
        <input type="checkbox" checked />
        <div class="option__box"></div>
        <span class="option__text">Lowercase (a–z)</span>
      </label>
      <label class="option checked" id="opt-numbers">
        <input type="checkbox" checked />
        <div class="option__box"></div>
        <span class="option__text">Numbers (0–9)</span>
      </label>
      <label class="option checked" id="opt-symbols">
        <input type="checkbox" checked />
        <div class="option__box"></div>
        <span class="option__text">Symbols (!@#$…)</span>
      </label>
    </div>

    <!-- Generate buttons -->
    <button class="btn-generate" id="generateBtn">⚡ Generate Password</button>
    <button class="btn-refresh" id="refreshBtn">↻ Generate Another</button>

    <!-- History -->
    <div class="history" id="historySection" style="display:none">
      <h3>Recent Passwords</h3>
      <div class="history__list" id="historyList"></div>
    </div>

  </div>

  <p class="back-link">Built by <a href="index.html">John Gichaga</a> · Portfolio Project</p>

  <!-- Toast -->
  <div class="toast" id="toast">✓ Copied to clipboard!</div>

  <script>
    // ── Character sets ──
    const CHARS = {
      upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lower:   'abcdefghijklmnopqrstuvwxyz',
      numbers: '0123456789',
      symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
    }

    // ── State ──
    let currentPassword = ''
    const history = []

    // ── DOM refs ──
    const pwdText      = document.getElementById('pwdText')
    const copyBtn      = document.getElementById('copyBtn')
    const lengthSlider = document.getElementById('lengthSlider')
    const lengthVal    = document.getElementById('lengthVal')
    const generateBtn  = document.getElementById('generateBtn')
    const refreshBtn   = document.getElementById('refreshBtn')
    const toast        = document.getElementById('toast')
    const strengthLabel = document.getElementById('strengthLabel')
    const bars         = [1,2,3,4].map(i => document.getElementById('bar'+i))

    // Checkbox options
    const opts = {
      upper:   document.getElementById('opt-upper'),
      lower:   document.getElementById('opt-lower'),
      numbers: document.getElementById('opt-numbers'),
      symbols: document.getElementById('opt-symbols'),
    }

    // ── Toggle checkboxes ──
    Object.values(opts).forEach(label => {
      label.addEventListener('click', () => {
        const cb = label.querySelector('input')
        // Prevent unchecking all
        const checkedCount = Object.values(opts).filter(o => o.classList.contains('checked')).length
        if (label.classList.contains('checked') && checkedCount === 1) return
        cb.checked = !cb.checked
        label.classList.toggle('checked', cb.checked)
      })
    })

    // ── Slider ──
    lengthSlider.addEventListener('input', () => {
      lengthVal.textContent = lengthSlider.value
    })

    // ── Generate ──
    function generate() {
      const length = parseInt(lengthSlider.value)
      let charset = ''
      if (opts.upper.classList.contains('checked'))   charset += CHARS.upper
      if (opts.lower.classList.contains('checked'))   charset += CHARS.lower
      if (opts.numbers.classList.contains('checked')) charset += CHARS.numbers
      if (opts.symbols.classList.contains('checked')) charset += CHARS.symbols

      if (!charset) return

      // Cryptographically random using Web Crypto API
      const array = new Uint32Array(length)
      crypto.getRandomValues(array)
      currentPassword = Array.from(array)
        .map(n => charset[n % charset.length])
        .join('')

      // Display
      pwdText.textContent = currentPassword
      pwdText.classList.remove('empty')

      // Update strength
      updateStrength()

      // Add to history (max 5)
      history.unshift(currentPassword)
      if (history.length > 5) history.pop()
      renderHistory()

      // Animate the password display
      pwdText.style.opacity = '0'
      pwdText.style.transform = 'translateY(6px)'
      requestAnimationFrame(() => {
        pwdText.style.transition = 'opacity 0.3s, transform 0.3s'
        pwdText.style.opacity = '1'
        pwdText.style.transform = 'none'
      })
    }

    // ── Strength calculator ──
    function updateStrength() {
      const len = currentPassword.length
      const hasUpper   = /[A-Z]/.test(currentPassword)
      const hasLower   = /[a-z]/.test(currentPassword)
      const hasNumber  = /[0-9]/.test(currentPassword)
      const hasSymbol  = /[^A-Za-z0-9]/.test(currentPassword)
      const typeCount  = [hasUpper, hasLower, hasNumber, hasSymbol].filter(Boolean).length

      let score = 0
      if (len >= 8)  score++
      if (len >= 12) score++
      if (len >= 16) score++
      if (typeCount >= 3) score++
      if (typeCount === 4 && len >= 16) score = 4

      const levels = [
        { label: 'Weak',    color: '#EF4444', fill: 1 },
        { label: 'Fair',    color: '#F97316', fill: 2 },
        { label: 'Good',    color: '#EAB308', fill: 3 },
        { label: 'Strong',  color: '#22C55E', fill: 4 },
      ]
      const level = levels[Math.max(0, Math.min(score - 1, 3))]

      bars.forEach((bar, i) => {
        bar.style.background = i < level.fill ? level.color : 'var(--surface2)'
      })
      strengthLabel.textContent = level.label
      strengthLabel.style.color = level.color
    }

    // ── Copy ──
    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text)
        showToast()
      } catch {
        // Fallback
        const ta = document.createElement('textarea')
        ta.value = text
        document.body.appendChild(ta)
        ta.select()
        document.execCommand('copy')
        document.body.removeChild(ta)
        showToast()
      }
    }

    function showToast() {
      toast.classList.add('show')
      setTimeout(() => toast.classList.remove('show'), 2200)
    }

    copyBtn.addEventListener('click', () => {
      if (currentPassword) copyToClipboard(currentPassword)
    })

    // ── History ──
    function renderHistory() {
      const section = document.getElementById('historySection')
      const list    = document.getElementById('historyList')
      if (history.length === 0) { section.style.display = 'none'; return }
      section.style.display = 'block'
      list.innerHTML = history.map((p, i) => `
        <div class="history__item">
          <span class="history__pwd">${p}</span>
          <span class="history__copy" onclick="copyToClipboard('${p.replace(/'/g, "\\'")}')">Copy</span>
        </div>
      `).join('')
    }

    // ── Event listeners ──
    generateBtn.addEventListener('click', generate)
    refreshBtn.addEventListener('click', generate)

    // Auto-generate on load
    generate()
  </script>

</body>
</html>
